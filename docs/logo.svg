<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stellar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />
  <circle cx="100" cy="100" r="90" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" />
  <!-- Lock body -->
  <rect x="68" y="90" width="64" height="50" rx="8" ry="8" fill="url(#lock)" />
  <!-- Lock shackle -->
  <path d="M 78 90 L 78 72 Q 78 52 100 52 Q 122 52 122 72 L 122 90" fill="none" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" />
  <!-- Keyhole -->
  <circle cx="100" cy="110" r="8" fill="#1e3a5f" />
  <rect x="97" y="112" width="6" height="14" rx="2" fill="#1e3a5f" />
  <!-- Stellar star (4-pointed) top-left -->
  <g transform="translate(42, 42) scale(0.5)" opacity="0.9">
    <polygon points="20,0 24,16 40,20 24,24 20,40 16,24 0,20 16,16" fill="url(#stellar)" />
  </g>
  <!-- Stellar star top-right -->
  <g transform="translate(142, 38) scale(0.4)" opacity="0.7">
    <polygon points="20,0 24,16 40,20 24,24 20,40 16,24 0,20 16,16" fill="url(#stellar)" />
  </g>
  <!-- Stellar star bottom-left -->
  <g transform="translate(38, 140) scale(0.35)" opacity="0.6">
    <polygon points="20,0 24,16 40,20 24,24 20,40 16,24 0,20 16,16" fill="url(#stellar)" />
  </g>
  <!-- Stellar star bottom-right -->
  <g transform="translate(148, 148) scale(0.45)" opacity="0.8">
    <polygon points="20,0 24,16 40,20 24,24 20,40 16,24 0,20 16,16" fill="url(#stellar)" />
  </g>
  <!-- Small orbiting dots -->
  <circle cx="55" cy="95" r="3" fill="#93c5fd" opacity="0.5" />
  <circle cx="150" cy="80" r="2.5" fill="#93c5fd" opacity="0.4" />
  <circle cx="145" cy="130" r="2" fill="#93c5fd" opacity="0.3" />
</svg>
