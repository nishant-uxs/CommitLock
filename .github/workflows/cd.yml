name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: []

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build application
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_CONTRACT_ID: CANEW3ZQL7QVB7ZAH5R6XXEUZX3TGO5CONSPXBAFSPWSEK2ITBZJ7WT5
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_FEE_SPONSOR_ENABLED: "true"

      - name: Trigger Render deploy
        run: |
          echo "Render auto-deploys from main branch via render.yaml Blueprint."
          echo "This job validates the build succeeds before Render picks it up."
          echo "Deployment URL: https://commitlock.onrender.com"

      - name: Post-deploy health check
        run: |
          echo "Waiting for Render to deploy..."
          sleep 10
          echo "Checking health endpoint..."
          curl -sf https://commitlock.onrender.com/api/health || echo "Health check pending - Render may still be deploying"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://commitlock.onrender.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Metrics**: https://commitlock.onrender.com/metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Monitoring**: https://commitlock.onrender.com/monitoring" >> $GITHUB_STEP_SUMMARY
          echo "- **Health**: https://commitlock.onrender.com/api/health" >> $GITHUB_STEP_SUMMARY
